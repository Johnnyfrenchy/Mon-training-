<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Training">
<title>Mon Training</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

  :root {
    --bg: #0A0A0C;
    --bg2: #111114;
    --bg3: #18181C;
    --border: #222226;
    --text: #F0F0F0;
    --muted: #555560;
    --push: #E84A5F;
    --pull: #4A90D9;
    --lower: #27AE60;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; }

  #app { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(72px + var(--safe-bottom)); padding-top: var(--safe-top); }

  .screen { display: none; padding: 0 16px; }
  .screen.active { display: block; }

  /* ── TYPOGRAPHY ── */
  .label { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; font-weight: 600; }
  .title { font-family: 'Bebas Neue', cursive; font-size: 38px; letter-spacing: 2px; line-height: 1; }
  .subtitle { font-family: 'Bebas Neue', cursive; font-size: 24px; letter-spacing: 1px; }

  /* ── CARDS ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .card-btn { cursor: pointer; transition: background 0.15s; }
  .card-btn:active { background: var(--bg3); }

  /* ── SEANCE CARDS ── */
  .seance-card { display: flex; align-items: center; gap: 14px; }
  .seance-icon { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .seance-info { flex: 1; }
  .seance-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 2px; padding: 2px 8px; border-radius: 4px; color: #fff; margin-bottom: 4px; text-transform: uppercase; }
  .seance-name { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 1px; line-height: 1.1; }
  .seance-last { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .arrow { font-size: 18px; }

  /* ── STAT CHIPS ── */
  .stats-row { display: flex; gap: 20px; padding: 16px 0; }
  .stat { }
  .stat-val { font-family: 'Bebas Neue'; font-size: 32px; color: var(--text); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  /* ── WORKOUT HEADER ── */
  .workout-header { position: sticky; top: 0; z-index: 20; background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 16px; }
  .workout-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .progress-bar { background: var(--border); border-radius: 4px; height: 4px; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .progress-text { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* ── EXERCISE CARD ── */
  .ex-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 14px; overflow: hidden; transition: border-color 0.2s; }
  .ex-card.complete { border-color: rgba(39,174,96,0.35); }

  .ex-illustration { width: 100%; height: 140px; background: var(--bg3); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .ex-illustration svg { max-height: 120px; max-width: 90%; }
  .ex-machine-badge { position: absolute; bottom: 8px; right: 10px; background: rgba(0,0,0,0.7); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 10px; color: var(--muted); letter-spacing: 0.5px; backdrop-filter: blur(4px); }

  .ex-body { padding: 14px; }
  .ex-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .ex-check-icon { font-size: 15px; }
  .ex-name { font-size: 15px; font-weight: 600; }
  .ex-detail { font-size: 11px; color: var(--muted); margin-bottom: 12px; }

  .sets-header { display: grid; grid-template-columns: 26px 1fr 1fr 36px; gap: 6px; margin-bottom: 8px; }
  .sets-header span { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; text-align: center; }

  .set-row { display: grid; grid-template-columns: 26px 1fr 1fr 36px; gap: 6px; margin-bottom: 8px; align-items: center; transition: opacity 0.2s; }
  .set-row.done { opacity: 0.5; }
  .set-num { text-align: center; font-size: 12px; color: var(--muted); font-weight: 600; }

  .set-input-wrap { position: relative; }
  .set-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 6px; color: var(--text); font-size: 15px; text-align: center; outline: none; font-family: 'DM Sans'; -webkit-appearance: none; appearance: none; }
  .set-input:focus { border-color: #444; }
  .set-hint { position: absolute; bottom: -14px; left: 0; right: 0; text-align: center; font-size: 9px; color: var(--push); letter-spacing: 0.3px; white-space: nowrap; }

  .set-check { width: 32px; height: 32px; border-radius: 8px; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; transition: all 0.15s; }
  .set-check.checked { background: var(--lower); border-color: var(--lower); }

  .sets-spacer { height: 10px; }

  /* ── FINISH BUTTON ── */
  .finish-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: var(--bg); border-top: 1px solid var(--border); padding-bottom: calc(12px + var(--safe-bottom)); }
  .finish-btn { width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 2px; transition: all 0.2s; border: 2px solid; }

  /* ── CANCEL BTN ── */
  .cancel-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-family: 'DM Sans'; }

  /* ── HISTORY ── */
  .hist-row { display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .hist-name { font-size: 13px; font-weight: 600; color: #ddd; }
  .hist-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .hist-arrow { margin-left: auto; font-size: 14px; color: #333; }

  /* ── SESSION DETAIL ── */
  .session-sets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .session-set-chip { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--muted); }
  .session-set-chip.done { color: #ddd; }

  /* ── BACK BUTTON ── */
  .back-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 0; margin-right: 4px; }

  /* ── DIVIDER ── */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 32px 0; color: var(--muted); font-size: 13px; }

  /* ── SECTION HEADER ── */
  .section-header { padding: 20px 0 10px; }
</style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════
       HOME
  ══════════════════════════════════════ -->
  <div id="screen-home" class="screen active">
    <div style="padding: 28px 0 8px;">
      <p class="label">Programme PPL</p>
      <h1 class="title" style="margin-top: 4px;">Mon<br>Training</h1>
      <div class="stats-row" id="home-stats"></div>
    </div>
    <div class="divider" style="margin-top:0;"></div>

    <div class="section-header"><p class="label">Commencer</p></div>
    <div id="seance-cards"></div>

    <div id="history-section">
      <div class="divider"></div>
      <div class="section-header"><p class="label">Historique récent</p></div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       WORKOUT
  ══════════════════════════════════════ -->
  <div id="screen-workout" class="screen">
    <div class="workout-header" id="workout-header"></div>
    <div style="padding: 16px 0 0;" id="exercises-list"></div>
    <div style="height: 80px;"></div>
  </div>

  <!-- ══════════════════════════════════════
       SESSION DETAIL
  ══════════════════════════════════════ -->
  <div id="screen-session" class="screen">
    <div style="padding: 16px 0 8px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 16px;">
      <button class="back-btn" onclick="showHome()">←</button>
      <div id="session-header"></div>
    </div>
    <div id="session-detail"></div>
  </div>

</div>

<!-- Fixed finish button (workout only) -->
<div class="finish-bar" id="finish-bar" style="display:none;">
  <button class="finish-btn" id="finish-btn" onclick="finishWorkout()"></button>
</div>

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const STORAGE_KEY = 'fp_tracker_v2';
let state = { sessions: [] };
let current = null; // active workout

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
}

function getLastSession(key) {
  return state.sessions.find(s => s.key === key) || null;
}

function getLastKg(key, exId, setIdx) {
  const s = getLastSession(key);
  return s?.sets?.[exId]?.[setIdx]?.kg || null;
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('finish-bar').style.display = id === 'workout' ? 'block' : 'none';
  document.getElementById('app').scrollTop = 0;
}

function showHome() {
  renderHome();
  showScreen('home');
}

function showSession(session) {
  renderSessionDetail(session);
  showScreen('session');
}

// ══════════════════════════════════════════════
// RENDER HOME
// ══════════════════════════════════════════════
function renderHome() {
  // Stats
  const weekAgo = new Date(Date.now() - 7*864e5);
  const weekCount = state.sessions.filter(s => new Date(s.startedAt) > weekAgo).length;
  document.getElementById('home-stats').innerHTML = `
    <div class="stat"><div class="stat-val">${state.sessions.length}</div><div class="stat-label">Sessions total</div></div>
    <div class="stat"><div class="stat-val">${weekCount}</div><div class="stat-label">Cette semaine</div></div>
  `;

  // Séance cards
  const container = document.getElementById('seance-cards');
  container.innerHTML = '';
  ['A','B','C'].forEach(key => {
    const s = PROGRAM[key];
    const color = COLORS[key];
    const last = getLastSession(key);
    const card = document.createElement('div');
    card.className = 'card card-btn';
    card.style.borderLeft = `3px solid ${color}`;
    card.innerHTML = `
      <div class="seance-card">
        <div class="seance-icon" style="background:${color}18;">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            ${key === 'A' ? '<path d="M4 14h20M14 4v20" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round"/><circle cx="14" cy="14" r="5" fill="' + color + '" fill-opacity="0.3"/>' :
              key === 'B' ? '<path d="M5 10 C5 6 23 6 23 10 C23 14 5 18 5 22" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round" fill="none"/>' :
              '<path d="M6 20 L14 8 L22 20" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="9" y1="16" x2="19" y2="16" stroke="' + color + '" stroke-width="2" stroke-linecap="round"/>'}
          </svg>
        </div>
        <div class="seance-info">
          <span class="seance-tag" style="background:${color}">${key} — ${s.label.toUpperCase()}</span>
          <div class="seance-name">${s.subtitle}</div>
          <div class="seance-last">${last ? '↻ ' + formatDate(last.startedAt) : 'Pas encore réalisée'}</div>
        </div>
        <span class="arrow" style="color:${color}">→</span>
      </div>
    `;
    card.onclick = () => startWorkout(key);
    container.appendChild(card);
  });

  // History
  const histList = document.getElementById('history-list');
  const histSection = document.getElementById('history-section');
  if (state.sessions.length === 0) {
    histSection.style.display = 'none';
    return;
  }
  histSection.style.display = 'block';
  histList.innerHTML = '';
  state.sessions.slice(0, 6).forEach(session => {
    const prog = PROGRAM[session.key];
    const color = COLORS[session.key];
    const done = Object.values(session.sets).flat().filter(x => x.done).length;
    const total = Object.values(session.sets).flat().length;
    const card = document.createElement('div');
    card.className = 'card card-btn';
    card.innerHTML = `
      <div class="hist-row">
        <div class="hist-dot" style="background:${color}"></div>
        <div>
          <div class="hist-name">Séance ${session.key} — ${prog.label}</div>
          <div class="hist-meta">${formatDate(session.startedAt)} · ${done}/${total} séries</div>
        </div>
        <span class="hist-arrow">›</span>
      </div>
    `;
    card.onclick = () => showSession(session);
    histList.appendChild(card);
  });
}

// ══════════════════════════════════════════════
function startWorkout(key) {
  const seance = PROGRAM[key];
  const sets = {};
  seance.exercises.forEach(ex => {
    sets[ex.id] = Array.from({length: ex.sets}, () => ({kg:'', reps:'', done:false}));
  });
  current = { key, startedAt: new Date().toISOString(), sets };
  renderWorkout();
  showScreen('workout');
}

function renderWorkout() {
  if (!current) return;
  const seance = PROGRAM[current.key];
  const color = COLORS[current.key];
  const allSets = Object.values(current.sets).flat();
  const done = allSets.filter(s => s.done).length;
  const total = allSets.length;
  const pct = Math.round((done / total) * 100);

  // Header
  document.getElementById('workout-header').innerHTML = `
    <div class="workout-title-row">
      <div>
        <p class="label">En cours</p>
        <h2 class="subtitle">Séance ${current.key} — <span style="color:${color}">${seance.label}</span></h2>
      </div>
      <button class="cancel-btn" onclick="cancelWorkout()">Annuler</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="background:${color}; width:${pct}%"></div></div>
    <p class="progress-text">${done} / ${total} séries · ${pct}%</p>
  `;

  // Finish button
  const btn = document.getElementById('finish-btn');
  btn.style.background = pct === 100 ? color : 'transparent';
  btn.style.borderColor = color;
  btn.style.color = pct === 100 ? '#fff' : color;
  btn.textContent = pct === 100 ? '✓ Terminer la séance' : `Terminer (${pct}% complété)`;

  // Exercises
  const list = document.getElementById('exercises-list');
  list.innerHTML = '';

  seance.exercises.forEach(ex => {
    const sets = current.sets[ex.id];
    const allDone = sets.every(s => s.done);
    const card = document.createElement('div');
    card.className = 'ex-card' + (allDone ? ' complete' : '');
    card.id = 'excard-' + ex.id;

    let setsHTML = `
      <div class="sets-header">
        <span>#</span><span>KG</span><span>Reps</span><span></span>
      </div>
    `;
    sets.forEach((set, i) => {
      const lastKg = getLastKg(current.key, ex.id, i);
      setsHTML += `
        <div class="set-row ${set.done ? 'done' : ''}" id="setrow-${ex.id}-${i}">
          <span class="set-num">${i+1}</span>
          <div class="set-input-wrap">
            <input class="set-input" type="number" inputmode="decimal" placeholder="${lastKg || '0'}"
              value="${set.kg}" onchange="updateSet('${ex.id}',${i},'kg',this.value)"
              oninput="updateSet('${ex.id}',${i},'kg',this.value)"/>
            ${lastKg && !set.kg ? `<span class="set-hint">↑ ${lastKg}kg</span>` : ''}
          </div>
          <input class="set-input" type="number" inputmode="numeric" placeholder="0"
            value="${set.reps}" onchange="updateSet('${ex.id}',${i},'reps',this.value)"
            oninput="updateSet('${ex.id}',${i},'reps',this.value)"/>
          <button class="set-check ${set.done ? 'checked' : ''}" onclick="toggleDone('${ex.id}',${i})" style="${set.done ? 'background:' + color + ';border-color:' + color : ''}">
            ${set.done ? '✓' : ''}
          </button>
        </div>
      `;
    });
    setsHTML += '<div class="sets-spacer"></div>';

    card.innerHTML = `
      <div class="ex-illustration" style="background:linear-gradient(135deg, #111114 0%, #18181c 100%);">
        ${ex.svg}
        <div class="ex-machine-badge">${ex.machine}</div>
      </div>
      <div class="ex-body">
        <div class="ex-name-row">
          ${allDone ? `<span class="ex-check-icon" style="color:${color}">✓</span>` : ''}
          <p class="ex-name" style="color:${allDone ? color : '#e0e0e0'}">${ex.name}</p>
        </div>
        <p class="ex-detail">${ex.detail} · <span style="color:${color}">${ex.target}</span> · RIR ${ex.rir}</p>
        <p style="font-size:11px; color:#666; margin-bottom:14px; font-style:italic;">${ex.tip}</p>
        ${setsHTML}
      </div>
    `;
    list.appendChild(card);
  });
}

function updateSet(exId, setIdx, field, value) {
  if (!current) return;
  current.sets[exId][setIdx][field] = value;
  // No full re-render to preserve focus
  updateProgressBar();
}

function toggleDone(exId, setIdx) {
  if (!current) return;
  current.sets[exId][setIdx].done = !current.sets[exId][setIdx].done;
  // Partial update for performance
  const setRow = document.getElementById(`setrow-${exId}-${setIdx}`);
  const done = current.sets[exId][setIdx].done;
  const color = COLORS[current.key];
  if (setRow) setRow.className = 'set-row' + (done ? ' done' : '');
  const btn = setRow?.querySelector('.set-check');
  if (btn) {
    btn.className = 'set-check' + (done ? ' checked' : '');
    btn.style.background = done ? color : 'transparent';
    btn.style.borderColor = done ? color : 'var(--border)';
    btn.textContent = done ? '✓' : '';
  }
  // Check if whole exercise done
  const allDone = current.sets[exId].every(s => s.done);
  const exCard = document.getElementById('excard-' + exId);
  if (exCard) {
    exCard.className = 'ex-card' + (allDone ? ' complete' : '');
  }
  updateProgressBar();
}

function updateProgressBar() {
  if (!current) return;
  const color = COLORS[current.key];
  const allSets = Object.values(current.sets).flat();
  const done = allSets.filter(s => s.done).length;
  const total = allSets.length;
  const pct = Math.round((done / total) * 100);
  const fill = document.querySelector('.progress-fill');
  const text = document.querySelector('.progress-text');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = `${done} / ${total} séries · ${pct}%`;
  const btn = document.getElementById('finish-btn');
  if (btn) {
    btn.style.background = pct === 100 ? color : 'transparent';
    btn.style.color = pct === 100 ? '#fff' : color;
    btn.textContent = pct === 100 ? '✓ Terminer la séance' : `Terminer (${pct}% complété)`;
  }
}

function cancelWorkout() {
  if (confirm('Abandonner la séance ? Les données ne seront pas sauvegardées.')) {
    current = null;
    showHome();
  }
}

function finishWorkout() {
  if (!current) return;
  const session = { ...current, finishedAt: new Date().toISOString() };
  state.sessions.unshift(session);
  saveState();
  current = null;
  showHome();
}

// ══════════════════════════════════════════════
// SESSION DETAIL
// ══════════════════════════════════════════════
function renderSessionDetail(session) {
  const seance = PROGRAM[session.key];
  const color = COLORS[session.key];
  const allSets = Object.values(session.sets).flat();
  const doneSets = allSets.filter(s => s.done).length;

  document.getElementById('session-header').innerHTML = `
    <div>
      <p class="label">${formatDate(session.startedAt)}</p>
      <h2 class="subtitle">Séance ${session.key} — <span style="color:${color}">${seance.label}</span></h2>
      <p style="font-size:12px; color:var(--muted); margin-top:3px;">${doneSets} séries complétées</p>
    </div>
  `;

  const detail = document.getElementById('session-detail');
  detail.innerHTML = '';
  seance.exercises.forEach(ex => {
    const sets = session.sets[ex.id] || [];
    let chips = sets.map((s,i) => `
      <div class="session-set-chip ${s.done ? 'done' : ''}">
        S${i+1} · ${s.kg ? s.kg+'kg' : '—'} × ${s.reps || '—'}
      </div>
    `).join('');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <p style="font-size:14px; font-weight:600; color:#ddd;">${ex.name}</p>
      <p style="font-size:11px; color:var(--muted); margin-top:2px;">${ex.machine}</p>
      <div class="session-sets">${chips}</div>
    `;
    detail.appendChild(card);
  });
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
loadState();
renderHome();
</script>
